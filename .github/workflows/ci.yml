name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend safety checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: mirs_testing
          MYSQL_ROOT_PASSWORD: ci-only-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=root --password=ci-only-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      APP_DEBUG: false
      DATABASE_URL: ''
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: mirs_testing
      DB_USERNAME: root
      DB_PASSWORD: ci-only-password
      TEST_ALLOWED_DATABASE_HOSTS: 127.0.0.1
      TEST_PROHIBITED_DATABASES: forge,laravel,mirs,production,fc_1_data_db_testing
      MAIL_MAILER: array
      CACHE_DRIVER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array

    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          extensions: bcmath, dom, fileinfo, gd, mbstring, pdo_mysql, xml, xmlreader, xmlwriter, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer downloads
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.cache/composer/files
          key: composer-${{ runner.os }}-php84-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php84-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Audit Composer dependencies
        run: composer audit --locked --abandoned=fail

      - name: Generate ephemeral application key
        shell: bash
        run: php -r '$key = "base64:".base64_encode(random_bytes(32)); fwrite(STDOUT, "::add-mask::{$key}\n"); file_put_contents(getenv("GITHUB_ENV"), "APP_KEY={$key}\n", FILE_APPEND);'

      - name: Prove unsafe database configuration is rejected
        shell: bash
        run: |
          if DB_DATABASE=mirs php -r 'require "vendor/autoload.php"; Tests\Support\TestDatabaseGuard::assertSafe(Tests\Support\TestDatabaseGuard::environment());' >/dev/null 2>&1; then
            echo "The test database guard accepted an unsafe database name."
            exit 1
          fi
          echo "Unsafe database configuration was rejected before Laravel booted."

      - name: Reset disposable MySQL database
        run: composer test:reset

      - name: Check PHP formatting
        id: pint
        continue-on-error: true
        run: vendor/bin/pint --test

      - name: Run Larastan
        id: larastan
        continue-on-error: true
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run PHPUnit unit tests
        id: unit-tests
        continue-on-error: true
        run: vendor/bin/phpunit --testsuite Unit --log-junit storage/unit-tests.xml

      - name: Run PHPUnit feature tests
        id: feature-tests
        continue-on-error: true
        run: vendor/bin/phpunit --testsuite Feature --log-junit storage/feature-tests.xml

      - name: Upload failed PHPUnit reports
        if: steps.unit-tests.outcome == 'failure' || steps.feature-tests.outcome == 'failure'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: phpunit-reports-${{ github.run_id }}
          path: storage/*-tests.xml
          if-no-files-found: ignore
          retention-days: 7

      - name: Enforce backend quality gate
        if: always()
        shell: bash
        run: |
          test "${{ steps.pint.outcome }}" = "success"
          test "${{ steps.larastan.outcome }}" = "success"
          test "${{ steps.unit-tests.outcome }}" = "success"
          test "${{ steps.feature-tests.outcome }}" = "success"

  frontend:
    name: Frontend safety checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Set up Node 24 LTS
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit production frontend dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Review full frontend audit
        run: npm audit --audit-level=high

      - name: Run ESLint
        id: eslint
        continue-on-error: true
        run: npm run lint

      - name: Run Vue type checking
        id: vue-tsc
        continue-on-error: true
        run: npm run typecheck

      - name: Build production frontend
        id: vite-build
        continue-on-error: true
        run: npm run build

      - name: Enforce frontend quality gate
        if: always()
        shell: bash
        run: |
          test "${{ steps.eslint.outcome }}" = "success"
          test "${{ steps.vue-tsc.outcome }}" = "success"
          test "${{ steps.vite-build.outcome }}" = "success"

  docker:
    name: Production Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - backend
      - frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Build production application target
        run: docker build --target app --tag mirs-ci:${{ github.sha }} .
